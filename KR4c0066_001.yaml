body:
  text: 追昔遊集巻上唐李紳撰南梁行江城鬱鬱春草長悠悠漢水浮清光雜英飛盡空晝景緑楊重陰官舍靜此時醉客縱横書公言可薦承明廬元和十四年䝉故山南僕射崔公奏觀察判官䝉以書奏見委常戯拙速青天詔下寵光至頒籍金閨徵石渠是嵗五月䝉恩除左拾遺秭歸山路煙嵐隔山木幽深晩花坼澗底紅光奪火燃揺風扇毒愁行客駱谷中多毒樹名山琵琶其花明艷與杜鵑花同樵者識之言曰早花殺人杜鵑啼咽花亦殷聲悲絶艶連空山斜陽瞥映淺深樹雲雨翻迷崖谷間山雞錦質矜毛羽透竹穿蘿命儔侣喬木幽谿上下同雄雌不惑飛棲處望秦峰迴過商顔浪疊雲堆萬簇山行盡杳冥青嶂外九重鐘漏紫霄間元和列侍明光殿諫草初焚市朝變北闕趨臣半隙塵南梁笑客皆飛霰追思感歎却昏迷霜鬢愁吟到曉鷄故篋嵗深開斷簡秋堂月曙掩遺袿嗚嗚曉角霞輝燦撫劒當楹一長歎芻狗無由學聖賢空持感激終昏旦趨翰苑遭誣搆四十六韻九五當乾徳三千應瑞符纂堯昌聖厯宗禹盛丕圖穆宗正月登位畫象垂新令銷兵易舊謨選賢方去智招諫忽升愚穆宗聴政五日䝉恩除右拾遺與淮南李公召入翰林也大樂調元氣神功運化鑪脫鱗超沆瀣翻翼集蓬壺捧日恩光别抽毫顧問殊鳳形憐彩筆龍頷借驪珠擲地聲名寡摩天羽翮孤潔身酬雨露利口扇讒諛碧海同宸眷鴻毛比賤軀辨疑分黒白舉直觝朋徒思政面論逢吉崔禎姦邪劉栖楚栢耆兇險張又新蘇景脩朋黨也庭獸方呈角階蓂始効莩日傾烏掩魄星落斗摧樞穆宗升遐墜劍悲喬岳號弓泣鼎湖亂羣逢害馬擇肉縱狂貙逢吉守澄栖楚栢耆又新等連為搏噬之徒也膽為隳肝竭心因瀝血枯滿帆推駭浪征棹折危途余以户部侍郎貶端州司馬燕客書方詐堯門信未孚敬宗即位之初遭逄吉等誣搆宸襟未察銜寃遂深謗興金就鑠毁極玉生瘉礪吻矜先搏張羅騁疾驅余遭逢吉搆成遂敬宗聴政之前一日宣命於月華門外竄逐地嫌稀魍魎海恨止畨禺栖楚等見逢吉怒所貶太近瘴嶺衝虵入蒸池躡虺趨望天收雪涕看鏡攬霜鬚草毒人驚剪茅荒室未誅火風晴處扇山鬼雨中呼窮老鄉闗逺羇愁骨肉無鵲靈窺牖户龜瑞出泥途余到端州有紅龜一州人李再榮來獻稱嘗有里人言吉徵也余放之於江中迴頭者三四游泳前後不去久之又南中小鵲名曰蠻鵲形小如燕雀里中言此鳥不常見至而嗚舞必冇喜應是日與龜同至於館也煙島深千瘴滄波淼四隅海標傳信使江棹認妻孥到接三冬暮來經六月徂暗灘朝不怒驚瀨夜無虞從吉州而南厯封康並足湍瀨危險至極其名有滅門擣鮓霸州等灘惟江水泛漲則無此患康州悦城縣有媪龍祠或能致雲雨余以書祝之家累以十月泝流龍為之三漲江水以達也俯首安羸業齊眉慰病夫涸魚思雨潤僵燕望雷蘇詔下因頒朔恩移詎省辜余以寶厯元年五月量移江州長史誑天猶指鹿依社尚憑狐逢吉尚為相度嶺瞻牛斗浮江淬轆轤未平人眦睚誰懼鬼揶揄湓浦潮通楚匡山地接吳庾樓清桂滿逺寺素蓮敷髣髴皆停馬悲歡盡隙駒舊交封宿草沈八侍郎武十五侍郎元九相公龎嚴京兆蔣防舍人皆為塵世衰鬢重生芻萬㦸分梁苑雙旌寄魯儒駸駸移嵗月苒苒近桑榆疲馬愁千里孤鴻念五湖終當賦歸去那更學楊朱憶春日太液池亭東候對長慶三年宫鶯報曉瑞烟開三島靈禽拂水迴橋轉彩虹當綺殿艦浮花鷁近蓬萊草承香輦王孫長桃艶仙顔阿母栽簪筆此時方侍從却思金馬笑鄒枚憶夜直金鑾殿承㫖長慶二年月當銀漢玉繩低深聴簫韶碧落齊門壓紫垣髙綺樹閣連青瑣近丹梯墨宣外渥一作握催飛詔草定新恩促換題明日一作惟我獨歸花路逺可憐人世隔雲霓一作泥憶春日曲江宴後許至芙蓉園春風上苑開桃李許詔看花入御園香徑草中迴玉勒鳳凰池畔泛金樽緑絲垂柳遮風暗紅藥低叢拂砌繁歸繞曲江煙景晩未央明月鎖千門天上樹新昌宅書堂前有藥樹一株今已盈拱則長慶中於翰林院内西軒藥樹下移得纔長一寸僕夫封一泥丸以歸植今則長成名之天上樹白榆星底開紅甲珠樹宫中長紫霄丹彩結心纔辨質碧姿抽葉乍成條羽衣道士偷𤣥圃金簡真人䕶玉苗長帶九天餘雨露近來葱翠欲成喬過荆門文苑英華下有歌字荆江水闊煙波轉荆門路繞山葱蒨帆勢侵雲滅又明山程背日昏還見青青麥壠啼飛鴉寂寞野徑棠梨花行行驅馬萬里逺漸入煙嵐危棧賖林中有鳥飛出一作幽谷月上千巖一聲哭腸斷思歸不可聞人言恨魄一作不來巴蜀我聴此鳥祝我魂魂死勿學聲銜寃縱為羽族莫棲息直上青雲呼帝閽此時山月如銜鏡嵒樹參差互輝映皎潔深看入澗泉分明細見樵人徑陰森鬼廟當郵亭雞豚日宰聞膻腥愚夫禍福自迷惑魍魎憑何通百靈月低山曉問行客巳酹椒漿拜荒陌惆悵忠貞徒自持誰祭山頭望夫石涉沅瀟屈原死處瀟湘陰滄浪淼淼靈沉沉蛟龍常怒虎長嘯山木翛翛波浪深煙横日落驚鴻起山映餘霞淼千里鴻叫離離入暮天霞消漠漠深雲水水靈江渚揚波濤黿鼉動盪風騷騷行人愁望待明月星漢沉浮􅲓鬼號屈原爾為懐忠没水府通天化靈物何不驅雷擊電除奸邪可憐空作沉泉骨舉杯瀝酒招爾魂月彩滉漾開乾坤波明水黒山隠見汨羅之上遥昏昏風帆候曉看五兩戍鼓鼘鼘逺山響潮滿江津猿鳥啼荆夫楚語飛蠻槳瀟湘島浦無人居風驚水暗惟蛟魚行來擊棹獨長歎問爾精魄何所如逾嶺嶠止荒陬抵髙要天將南北分寒燠北被羔裘南卉服寒氣凝為戎虜驕炎蒸結作蟲虺毒周王止化惟荆蠻漢武鑿逺通孱顔南標銅柱限荒徼五嶺從兹窮險艱衡山截斷炎方北迴鴈峰南瘴煙黒萬壑奔傷溢作瀧湍飛浪激如繩直南人謂水為瀧如源瀑流自郴南至韶北有八瀧其名神瀧傷瀧雞附等瀧皆急險不可上南中輕舟迅疾可入此水者因名之瀧船善游者為瀧夫千崖傍聳猿嘯悲丹蛇𤣥虺潜蜲蛇瀧夫擬楫劈髙浪瞥忽沉浮如電隨嶺頭刺竹䝉籠宻火拆紅蕉焰燒日嶺上泉分南北流行人照水愁傷骨陰森石路盤縈紆雨寒日燠常斯須瘴雲暫巻火山外蒼茫海氣窮畨禺鷓鴣猿鳥聲相續椎髻嘵呼同戚促百處谿灘異雨晴四時雷電迷昏旭魚腸鴈足望緘封地逺三江嶺萬重魚躍豈能通逺峽鴈飛難渡漳江東余在南中日知家累以其年九月九日發衡州因寄云菊花開日有人逄知過衡陽回鴈峰江樹送秋黄葉少海天迎逺碧雲重音書斷達聴蠻鵲風水多虞祝媪龍想見病身渾不識自磨青鏡照衰容慨然追感以疏其下有端州界有清逺峽深險莫測皆言水府為魚龍之窟也雲蒸地熱無霜霰桃李冬花匪時變天際長垂飲澗虹簷前不去銜泥燕南中虹四時長見見數則多颶風燕不歸蟄燕泥多沙人懼其沾汙於人毎逐其巢也幸逢雷雨盪妖昏提挈悲歡出海門西日眼明看少長北風身醒辨寒温賈生謫去因前席痛哭書成竟何益物忌忠良表是非朝驅絳灌為讐敵明皇聖徳異文皇不使無辜困鬼方漢日傅臣終委弃如今衰叟重輝光髙明白日恩深海齒髮雖殘壯心在空媿駑駘異一毛無令朽骨慙千載移九江效何水部余自九江及今周一紀矣秋波入白水帆去侵空小五兩劇奔星檣烏疾飛鳥湓城依落日湓浦看雲眇雲眇更蒼蒼匡山低夕陽楚客喜風水秦人悲異鄉異鄉秋思苦江皋月華吐漾漾隠波亭悠悠通月浦津橋歸候吏竹巷開門户容膝有匡床及肩纔數堵空谷非白駒懸磬我無虞體瘦寡行立家肥安啜哺天書憐譴謫重作朱轓客四座眼全清一麾頭半白今來思往事往事益悽然風月同今昔悲歡異目前四時嗟閱水一紀換流年獨有西庭鶴孤鳴白露天泛五湖效謝惠連范子蛻冠履扁舟逸霄漢嗟予抱險艱怵惕經瀰漫窮通泛濫勞趣適殊昏旦浴日盪層空浮天淼無畔依灘落葉聚立浦驚鴻散浪疊雪峰連山孤翠崖斷風帆同巨壑雲矗成髙岸宇宙或東西星辰沉粲爛霞生澒洞逺月吐青熒亂豈復問津迷休為吕梁歎漂沉自詎保覆溺心長判吳越郡異鄉嬰童反為翫依稀占井邑嘹唳同鵝鸛舉棹未宵分維舟方日旰徵斯濟川力若鼓凌風翰易狎當悔游臨深罔知難過鍾陵余長慶三年除江西觀察使奉詔不之任龍沙江尾抱鍾陵水郭村一作津橋晩景澄江對楚山千里月郭連漁浦萬家燈省抛雙斾辭榮寵遽落丹霄起愛憎惆悵舊游同草露却思恩顧一沾膺泝西江江風不定半晴陰愁對花時盡日吟孤棹自遲從蹭蹬亂帆爭疾競浮沉一身累困懐千載百口無虞貴萬金空濶逺看波浪息楚山安穏過雲岑早𤼵沙洲月落宿禽驚潮起風微曉霧生黄鶴浪明知上信黒龍山暗避前程火旗似辨吳門戍水驛遥迷楚塞城蕭索更看江葉下兩鄉俱是宦遊情守滁陽深秋憶登郡城望瑯琊山城小閣臨青嶂紅樹蓮宫接薜蘿斜日半巖開古殿野煙浮水掩輕波菊迎秋節西風急鴈引砧聲北思多深夜獨吟還不寐坐看凝露滿庭莎滁陽春日懐果園閒宴園中雜樹多手植也西園到日栽桃李紅白枝低拂酒杯繁艷只愁風處落醉筵多就月中開勸人莫折憐芳早把燭頻看畏曉催聞道數年深草露幾株猶得近池臺悲善才余守郡日有客遊者善彈琵琶問其所傳乃善才所授頃在内庭日别承恩顧賜宴曲江勅善才等二十人備樂自余經播遷善才已没因追感前事為悲善才此篇在郡日所為今編於新録穆王夜幸蓬池曲金鑾殿開髙秉燭東頭弟子曹善才琵琶請進新翻曲翠蛾列坐層城女笙笛參差齊笑語天顔靜聴朱絲彈衆樂寂然無敢舉銜花金鳳當承撥轉腕籠絃促揮抹花翻鳳嘯天上來徘徊滿殿飛春雪抽絃度曲新聲發金鈴玉佩相磋切流鶯子母飛上林仙鶴雌雄唳明月此時奉詔侍金鑾别殿承恩許召彈三月曲江春草緑九霄天樂下雲端紫髯供奉前屈膝盡彈妙曲當春日塞泉注射隴水開胡鴈翻飛朔天没日曛塵暗車馬散為惜新聲有餘歎明年冠劒閉橋山萬里孤臣投海畔籠禽鎩羽彊迴飛白首生從五嶺歸聞道善才成朽骨空餘弟子奉宣徽南譙寂寞三春晩有客彈絃獨淒怨靜聴深奏楚月光憶昔初聞曲江宴心悲不覺淚闌干更為調絃反覆彈秋吹動揺神女佩月珠敲擊水精盤自憐淮海同泥滓恨魄凝心未能死惆悵追懐萬事空雍門感慨徒為爾閭里謡效古歌鄉里兒桑麻鬱鬱禾黍肥冬有繿襦夏有絺兄鋤弟耨妻在機夜犬不吠開蓬扉鄉里兒醉還飽濁醪初熟勸翁媪一作嫂鳴鳩拂羽知年好齊和楊花踏春草勸年少樂耕桑使君為我剪荆棘使君為我驅豺狼林中無虎山有鹿水底無蛟魚有魴父漁子獵日歸一作白日暮月明處處舂黄粱鄉里兒東家父老為爾言鼔腹那知生育恩莫令太守馳朱轓懸鼔一鳴盧鵲喧惡聲主吏噪爾門唧唧力力烹鷄豚鄉里兒莫悲吒上有明王頒詔下重選賢良恤孤寡春日遲遲驅五馬留犢投錢以為謝鄉里兒終我詞我無工一作却惠巧唯無私舉手一揮臨路岐轉壽春守太和庚戌嵗二月祗命壽陽時替裴五墉終殁因視壁題自墉而上或除名在邊坐殿殁凡七子無一存焉壽人多寇盜好訴訐時謂之凶郡獷俗特著䝉此處之顧余衰年甘躡前患俾三月而寇靜朞年而人和虎不暴物姦吏屏竄三載復遭邪佞所惡授賔客分司東都或舉其目或寄於風亦粗繼詩人之末云未登崖谷尋丹竈且厯軒窻看壁題那遇八公生羽翼空悲七子委塵泥舊壇無復翔雲鶴廢壘曽經振鼔鼙㸃檢遺編盡朝菌應難求望一刀圭憶壽春廢虎坑余以春二月至郡主吏舉所職稱霍山多虎每嵗採茶為患擇肉於人至春常修䧟穽數十所勒獵者採其皮睛余悉除罷之是嵗虎不復為害至余去郡三載匪將履尾求兢惕那效探雛所患爭當路絶羣嘗誡暴為貓驅獮亦先迎每推至化宣餘力豈用潛機害爾生休逐豺狼止貪戾好為仁獸答皇明壽陽罷郡日有詩十首與追懐不殊今編於後兼紀瑞物今止八首淝河維舟阻凍祗待勅命太和七年十二月罷分符竹作閒官舟凍淝河擬棹難食蘗苦心甘處困飲氷持操敢辭寒夜燈空應漁家火朝食還依鴈宿灘西奏血誠遥稽首乞容歸病老江干又淮陽效理空多病疎受辭榮豈戀班陳力不任趨北闕有家無處寄東山疲驂豈念前程稅勌鳥安能待暮還珍重八公山下叟不勞重淚更追攀别連理樹盛唐縣有連理樹二株一株生於長樂鄉百姓地内從底兩枝向上為一體一本生於龍泉鄉百姓徐徳地内兩根隔澗水交榦合為一體澗名香風水闊一丈五尺垂陰敢慕甘棠葉附榦將呈瑞木符十步蘭茶同秀彩萬年枝葉表皇圖芟夷不及知無患雨露曽沾自不枯好住孤根託桃李莫令從此混樵蘇虎不食人霍山縣多猛虎頃常擇肉於人每至採茶及樵蘇常遭啖食人不堪命自太和四年至六年遂無侵暴雞犬不鳴深山窮谷夜行不止得攝令和僎狀稱潛山縣鄉村正趙珍夜歸中路與虎同行至家竟無傷害之意南山白額同馴擾亦變仁心去殺機不競牛甘令買患免遭狐假妄憑威渡河豈適他鄉害據谷終無暴物非爾效騶虞䕶生草豈徒柔伏在淮淝發壽陽分司勅到又遇新正感懐書事七年正月八日立春在壽陽凡四年休為建隼臨淝守轉作垂絲入洛人罷閱舊林三載籍又開新厯四年春雲遮北鴈愁行客柳起東風慰病身漸喜雪霜消解盡得隨風水到天津初出淝口入淮東風百里一作五日雪初晴淝口氷開好濯纓野老擁途知意重病夫抛郡喜身輕人心莫厭如絃直淮水長憐似鏡清回首夕嵐山翠逺楚郊烟樹隠襄一作憶層城入淮至盱眙山凝翠黛孤峰迥淮起銀花五兩髙天外綺霞迷海鶴日邊紅樹豔仙桃岸驚目眩同奔馬浦溢心疑覩抃鼇寄謝雲帆疾飛鳥莫誇迴鴈巻輕毛憶東湖菱歌罷唱鷁舟迴雪一作雲鷺銀鷗左右來霞散浦邊雲錦截月臨一作升湖面鏡波開魚驚翠羽金鱗躍蓮脫紅衣紫菂摧淮口直春偏悵望數株臨水是寒梅追昔遊集巻上
