body:
  text: 追昔遊集别集類一唐提要臣等謹案追昔遊集三卷唐李紳撰紳字公垂亳州人元和元年進士武宗時為中書侍即同中書門下平章事事迹具唐書本傳此集皆其未為相時所作朝公武讀書志載前有開成戊午八月紳自序此本無之詩凡一百一首新唐書本傳所載貶端州司馬禱神灘漲及刺夀州虎不為暴為河南尹惡少斂迹皆語出此集史傳事須實録而宋祁以紳所自言者為據殊乖徵信之義且考紳之赴端州也在夏秋之間其妻子舟行十月始至其時灘水減矣故以書祝媪龍祠而江復漲紳詩內及所自注者如此祁乃以為紳自度嶺時事是閲其集亦未審後儒以名之輕重為文之是非必謂新書勝舊書似非篤論也紳與李德裕元稹號三俊白居易亦有笑勸迂辛酒間吟短李詩句今觀此集音節嘽緩似不能與同時諸人角爭強弱然舂容恬雅無雕琢細碎之習其格究在晚唐諸人刻畫纖巧之上也乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2d8f481fcbc9f17a4cfbf1517a4b74bb4512c59f63e8c742cd0c5c3f03f17628
