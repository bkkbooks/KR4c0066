body:
  text: 追昔遊集巻下唐李紳撰宿越州天王寺太和八年自浙東觀察使又除太子賔客分司東都始發州郭越人父老男女數萬攜壺觴至江津相送海隅布政慙朞月江上沾巾媿萬人休按簿書懲黠吏未齊風俗昧良臣壺氷自潔中無玷鏡水非求下見鱗清夜佛宫觀色相却歸前老更前身却渡西陵别越中父老海潮晩上江風急津吏篙師語黙齊傾首奉觴看故老擁流爭拜見孩提慙非杜母臨襄峴自鄙朱翁別㑹稽漸舉雲帆煙水闊杳然鳬鴈各東西却到浙西出杭州界入蘇州八年浙西六郡灾旱百姓饑殍道路相望米價翔貴是嵗浙東大稔因請出米五萬斛賤估以救浙西居人詔下䝉允是嵗王璠不奏饑旱反怒隣境所救以為賣已遂與王涯合計誣搆罔上奏陳米非官米足私求利及璠伏誅䝉聖恩加察奸邪所罔初入浙西蘇州界吳人以卹災之惠猶具旌旛留戒於迥野之處不及城郭之所則相率拜泣於舟楫前是嵗盧周仁為蘇州刺史臨平水竭蒹葭死里社蕭條旅館秋嘗歎晉郊無乞糴豈忘吳俗共分憂野悲揚目稱嗟食林拯繄桑顧所求苛政尚存猶惕息老人偷拜擁前舟臨平湖竭鄉人言人有饑患是嵗中水竭魚鳥皆死蘇州不住遥望武丘報恩兩寺秋山古寺東西遶竹院松門悵望同幽鳥靜時侵徑月野煙消處滿林風塔分朱鴈餘霞外刹對金螭落照中官備散寮身却累往來慙謝二蓮宫迴望館娃故宫江雲斷續草綿連雲隔秋波樹覆煙飄雪荻花鋪漲渚變霜楓葉巻平田雀愁化水喧斜日鴻怨驚風叫暮天因問館娃何所恨破吳紅臉尚開蓮姑蘇臺雜句臺今遺跡連接靈巖寺採香徑響屧廊皆在寺内越書稱越王獻吳王黄金樓楣吳王所造姑蘇臺因獻楣遂以黄金盡飾樓以破其國越王巧破夫差國來獻黄金重雕刻西施醉舞花艷傾妬月嬌娥恣妖惑姑蘇百尺曉鋪開樓楣盡化黄金臺歌清管咽歡未極越師戈甲浮江來伍胥抉目看吳滅范蠡全身霸西越寂寞千年盡古墟蕭條兩地皆明月靈巖香徑掩禪扉秋草荒涼徧落暉江浦迴看鷗鳥没碧峰斜見鷺鷥飛如今白髮星星滿却作閒官不閒散野寺經過懼悔尤公程迫䠞悲秋館吳鄉越國舊淹留草樹煙霞昔徧遊雲水夢迴多感歎不惟惆悵至長洲開元寺石此寺多太湖石有峰巒竒狀者頃年多遊寓於此及太和七年往來皆不復到寺中石大半亦無也十層花宇真毫相數仞峰巒閉月扉攢立寶山中色界散周香海小輪圍坐隅咫尺窺巖壑窻外髙低辨翠微難保爾形終不轉莫令偷拂六銖衣皋橋伯鸞憔悴甘飄寓非向囂塵隠姓名鴻鵠羽毛終有志素絲琴瑟自諧聲故橋秋月無家照舊井寒泉見底清猶有餘風未磨滅至今鄉里重和鳴真娘墓吳之妓人歌舞有名者死葬于吳武丘寺前吳中少年從其志也墓多花草以蔽其上嘉興縣前亦有吳妓人蘇小小墓風雨之夕或聞其上有歌吹之音一株繁艷春城盡雙樹慈門忍草生愁態自隨風燭滅愛心難逐雨花輕黛消波月空蟾影歌息梁塵有􅆊聲還似錢塘蘇小小秪應迴首是卿卿却到無錫望芙蓉湖五首水寛山逺煙嵐迥柳岸縈迴在碧流清晝不風鳬鴈少却疑初夢鏡湖秋丹橘村邊獨火一作燭微碧流明處鴈初飛蕭條落葉垂楊岸隔水寥寥聞擣衣逐波雲影一作采參差逺背日嵐光隠見深猶似望中連海樹月生湖上是山隂舊山認得煙嵐近湖水平鋪碧岫間喜見雲泉還悵望自慙山叟不歸山翠崖幽谷分明處倦鳥歸雲在眼前惆悵白頭為四老逺隨塵土去伊川重到惠山再到石泉寺内有禪師鑒𤣥影堂在寺南峰下頃年與此僧同在惠山十年鑒𤣥至壽春相訪因追舊歡碧峰依舊松筠老重得經過已白頭俱是海天黄葉信兩逢霜節菊花秋望中白鶴憐歸翼行處青苔恨昔遊還向竹牕名姓下數行添記別離愁鑒𤣥影堂香燈寂寞網塵中煩惱身須色界空龍鉢巳傾無法雨虎床猶在有悲風定心地上浮泡一作雙漚没招手巖邊夢幻通深夜月明松子落儼然聴法侍生公别石泉在惠山寺松竹之下甘爽乃人間靈液清澄鑒肌骨含漱開神慮茶得此水皆盡芳味素一作晴沙見底空無色青石潛流暗有聲微度竹風涵淅瀝細浮松月透輕明一作盈桂凝秋露添靈液茗折香芽泛玉英應是梵宫一作居連洞府浴池今化醒泉清别雙温樹往年於惠山書房前手植今巳喬柯數尋千雲葱翠蔭日此樹移過江多死有類丹橘翠條盈尺憐孤秀植向西窻待月軒輕剪緑絲秋一作春葉暗宻扶纎榦夏陰繁故山手種一作植空懐想温室心知不敢言看一作為爾拂雲今得地莫隨陵谷改深根重别西湖東去日前别湖中雙鸂􅈑翡翠早梅等三題及西來則鸂􅈃翡翠悉皆翔失梅衰秋葉重起前歎耳浦邊梅葉看凋落波上雙禽去寂寥吹管曲傳花易失織文機學羽難飄雪欺春早摧芳蕚隼勵秋深拂翠翹繁豔彩毛無處所盡成愁歎別谿橋毘陵東山東山在毘陵驛南連水西館館即獨孤及在郡所置荒廢巳久至孟公簡重修植以花木松竹等可翫孟公在郡日余以校書郎從役同宴於此今則荒廢仍舊昔人别館淹留處卜築東山學謝家叢桂半空摧枳棘曲池平盡隔煙霞重開漁浦連天日更種春園滿地花依舊秋風還寂寞數行衰柳宿啼鴉建元寺寺在常州東郭松扉竹院各在岡阜地甚疎通接郊外每嵗寒食里人灑掃經過之所大厯中詩人郭勛曽賦寒食詩贈吏部先兄詩云蘭陵士女滿晴川郊外紛紛拜古埏萬井人家初一作皆禁火九原松栢自生煙人間後事非前事鏡裏今年老去年介子終知禄不及王孫誰復更相憐文苑英華題云寒食日寄李補闕末句作誰肯一相憐當時以為絶唱嘗在童兒即聞此詩非欲繼和盖紀事因書江城物候傷心地逺寺經過禁火辰芳草隴邊迴首客野花叢裏斷腸人紫荆繁艷空門晝紅藥深開古殿春歎息光陰催白髮莫悲風月獨沾巾却到金陵登北固亭龍形江影隔雲深虎勢山光入浪沉潮蹙海風驅萬里日浮天塹洞千尋衆峰作限横空碧一柱中維徹底金還叱檝師看五兩莫令辜負濟川心望鶴林寺仍嵗往來牽迫皆不得往元和初在故度支尚書兄賓府多因閒暇經遊此寺寺内有木蘭杜鵑繁茂人言至今猶未衰歇鶴栖峰下青蓮宇花發江城世界春紅照日髙殷奪火紫凝霞曙瑩銷塵每思載酒悲前事欲問題詩想舊身自歎秋風勞物役白頭拘束一閒人宿𤓰州煙昏水郭津亭晩迴望金陵若動揺衝浦迴風翻宿浪照沙低月斂殘潮柳經寒露看蕭索人改衰容自寂寥官冷舊諳唯旅館嵗陰輕薄是涼飇入揚州郭潮水舊通揚州郭内大厯巳後潮信不通李頎詩鸕鷀山頭一作頂片雨晴揚州郭一作城裏見潮生此可以驗菊芳沙渚殘花少柳過秋風墜葉疎堤繞門津喧井市路交村陌混樵漁畏衝主客呼童僕欲指潮痕問里閭非為掩身羞白髮自縁多病喜肩輿宿揚州館文苑英華方輿勝覽並作宿揚州水館舟依淺岸一作浦參差合橋映晴虹上下連輕檝過時揺水月逺燈繁處隔秋煙却思海嶠還悽歎近涉江濤更凛然閒凭欄干指星漢尚疑軒蓋在樓船州中小飲便别牛相笙歌罷曲辭賔侣庭竹移隂就小齋愁不解顔徒滿酌病非傷肺為憂懐恥矜學步貽身患豈慕醒狂躡禍階從此别離長酩酊洛陽狂狷任椎埋却過淮隂弔韓信廟功髙自棄漢元臣遺廟陰森楚水濱英主任賢増虎翼假王徼福犯龍鱗賤能忍恥悲狂少貴乏懐忠近佞人徒用千金酬一飯不知明哲重防身却入泗口洪河一派清淮接堤草蘆花萬里秋煙樹寂寥分楚澤海雲明滅滿揚州望深江漢連天逺思起鄉闗滿眼愁惆悵路岐真此處夕陽西没水東流重出洛陽東門商顔重命伊川叟時事知非入洛人連野碧流通御苑滿街秋草過天津每慚清秩容衰齒猶有華簪寄病身驅馬獨歸尋里巷日斜行處舊紅塵拜三川守開成元年三月二十五日䝉恩除河南尹四月六日詔下洛陽是月自春不雨已踰六旬此日謝恩未詣公府馳禱龍祠止九日大降膏澤連霔浹日時苗頓茂又里巷比多惡少皆免帽散衣聚為羣鬭或差肩追繞擊大毬里言謂之打棍語論士庶苦之車馬逢者不敢前都城為患日久詔下之日此輩皆失所在却歸負販之業閭里間無復前患恭承寵詔臨伊洛靜守朝章化比閭風變市兒驚偃草雨晴郊藪謬隨車改張琴瑟移膠柱止息笙簧辨魯魚唯有從容期一徳使齊文教奉皇居慶雲見文苑英華作現夏六月准詔祭中嶽宿少林寺祭畢歸寺有慶雲見於峰初如絳綃䝉覆上下巖樹透徹虚明照日俄頃諸崖谷間盡祥雲紛郁綿布自午至未不散禮成中嶽陳金冊祥報卿雲冠玉峰輕未透林疑待鳳細非行雨詎從龍巻風變彩霏微薄照日籠光映隠重還入九霄成沆瀣夕嵐生處鶴歸松靈蛇見少林寺二大松上有青虵不知所自下馬之際忽墜于地盤結異狀若紫組綬青光熒射逼之不怒問其寺僧僧云嘗見因令祝以箱奩引之遂逶迤就器送寺外倏忽如失之瑣文結綬靈虵降蠖屈螭盤顧視閒鱗䠞翠光抽璀璨腹連金彩動彎環巳應蛻骨風雷後豈効銜珠草莽間知爾全身護崑閬不矜揮尾在常山拜宣武軍節度使開成元年六月二十六日制授宣武軍節度使七月三日中使劉泰押送旌節止洛陽五日赴鎮出都門城内少長閭里士女相送者數萬人至白馬寺涕泣當車者不可止少尹嚴元容鞭胥吏市人怒其戀慕留臺御史杜牧使臺吏遮敺百姓令其廢祖帳油幢並入虎旗開錦橐從天鳳詔來星應魏師新鼓角地嫌梁苑舊池臺日暉紅斾分如電人擁青門動若雷伊洛鏡清迴首處是非紛雜任塵埃到宣武三十韻七月十二日到汴州是月鄭汴間不雨已餘月秋苗已悴十日至圃田天雨已降至十二日朝止秋稼頓茂軍禮亦成矣七月趨梁苑三年謝尹京舊風除物蠧新律奉師貞龍節雙油重蛇矛百練明躍魚連後斾騰虎耀前旌路轉金神並川開鐵馬横擁旄差白羽分轡引紅纓在浚風烟接維嵩鞏洛清貫魚奔騎疾連鴈巻行輕煙壘風調角秋原雨洗兵宿雲看布甲疎柳見分營鼓徹通宵警和門候曉晴虎符三校列魚胄萬夫迎弄馬猿猱健奔車角觝呈駕肩傍隘道張幕内連楹森㦸承三令攢戈退一聲及郊知雨過觀俗辨風行望宋憐思女遊梁念客卿義夫留感激公子播英名澤廣豚魚洽恩宣豈弟生善師忘任智中略在推誠式宴歌鐘合陳筵綺繡并戯鼙千卒躍均酒百壺傾樂與師徒共歡從井邑盈教通因漸染人恱尚和平授鉞慙分閫登壇荷列城虚裘朝獨坐雄劒夜孤鳴白髮侵霜變丹心捧日驚衞青終保志潘岳未忘情朞月終迷化三年詎有成惟看波海動天外斬長鯨追昔遊集巻下
