body:
  text: 追昔遊集卷中唐李紳撰七年初到洛陽寓居宣教里時已春暮而四老俱在洛中分司青莎滿地無三徑白髮緣頭忝四人官職謬齊商嶺客姓名那重漢廷臣聖朝寡罪容衰齒愚叟多慙未退身惟有門人憐鈍拙勸教沉醉洛陽春初秋忽奉詔除浙東觀察使檢校右貂龍樓寄引簪裾客鳳闕陪趨朔望朝疏受杜門期脫屣買臣歸邸忽乘軺印封龜紐知頒爵冠飾蟬緌更珥貂飛詔寵榮歡里舍豈徒斑白與垂髫憶至鞏縣河宿待家纍追懷鞏樹翻紅秋日斜水分伊洛照餘霞弓開後騎低初月鶚駐前旌拂暮鴉閨信坐遲青玉案弄兒閒望白羊車今來憶事涼風晚烟浦空悲黃菊花宿揚州江橫渡濶烟波晚潮過金陵落葉秋嘹唳塞鴻經楚澤淺深紅樹見揚州夜橋燈火連星漢水郭帆檣近斗牛今日市朝風俗變不須開口問迷樓憶被牛相留醉州中時無他賔牛公夜出真珠輩數人余有換樂曲詞時亦有傳於歌者嚴城畫角三聲閉清宴金樽一夕同銀燭座隅聽子夜寶筝絃上起春風酒徵舊對慙衰質曲換新詞感上宫淮海一從雲雨散杳然俱是夢魂中早渡揚子江時王璠在浙西日衝海浪翻銀屋江轉秋波走雪山青嶂迥開蹲虎戍碧流潛伏躍龍關地分吳楚星辰內水迫滄溟宇宙間焚却戍船無戰伐使知風教被烏蠻憶過潤州元和二年余以前進士為鎮海軍書奏從事秋九月兵亂余以不從書奏飛檄之請遭庶人李錡暴怒腰領不殊者再三後軍平尚書李公欲具事以聞之余以本乃誓節非欲求榮請罷所奏昔年從宦干戈地黃綬青春一魯儒弓犯控弦招武旅劍當抽匣問狂天帛書投筆封魚腹𤣥髮衝冠捋虎鬚談笑謝金何所愧不為偷買用兵符憶登棲霞寺峰效梁簡文文苑英華下有懷望二字香印煙火息法堂鐘磬餘紗燈耿晨焰釋子安襌居林葉脫紅影竹煙含綺疏星珠錯落耀月宇參差虛顧眺匪恣適曠襟懷卷舒江海渺清蕩丘陵何所如滔滔可問津耕者非長沮茅嶺感仙客蕭園成古墟移步下碧峰涉澗更躊躇鳥戲啄秋果翠驚銜素魚回塘彩鷁來落景標林箊漾漾棹翻月蕭蕭風襲裾勞歌起舊思感歎竟難攄却數共遊者凋落非里閭憶萬嵗樓望金山里言金山有龍盤護吳志云金陵虎踞又云萬嵗樓往年清夜浮於江中有宿樓者覺之金鎖縻於城上樓髙雉堞千師壘峰拔驚波萬壑攢山絶地維消虎踞水浮天險尚龍盤蜃噓雲拱飛江島鼇噴仙巖隔海瀾長對碧波臨古渡幾經風月與悲歡過梅里家於無錫四十載今敝廬數堵猶存今列題於後上家山山即惠山余頃居梅里常於惠山肄業舊室猶在垂白重遊追感多思因效吳筠體上家山家山依舊好昔去松桂長今來容鬚老上家山臨古道髙低入雲樹蕪沒連天草草色緑一作日萋萋寒蛬一作螿遍草啼噪鴉投一作啼樹逺行鴈帖雲齊嵒光翻落日僧火開經室竹洞磬聲長松樓鐘韻疾苔階泉一作滴溜缺石甃青莎密舊徑行處迷前交坐中失歎息整華冠持杯强自歡笑歌憐稚孺絃竹縱吹彈山明溪月上酒滿心聊放丱髮此淹留埀絲匪閒曠青山不可上昔事還惆悵況復白頭人追懷空望望憶東郭居昔余過稚齒從師昧知奧徒懷利物心不獲藏身寶曳婁一縫掖出處勞昏早醒醉迷啜哺衣裳辨顛倒忠誠貫白日直已憑蒼昊卷舌墮讒諛驚波息行潦衰禽息舊木疲馬知歸道楊柳長庭柯蘭荃覆階草旌旄光里舍騎服歡妻嫂緑鬢絶新知蒼鬚稀舊老冠緌身忝貴齊沐心常禱笙磬諒諧和庭除還灑掃栖遲還竹巷物役侵江島倏忽變星霜悲傷滿衷抱憶題惠山寺書堂故山一別光陰改秋露清風嵗月多松下壯心年少去池邊衰影老人過白雲生滅依岩岫青桂榮枯託薜蘿惟有此身長是客又驅旌斾寄煙波憶西湖雙鸂鶒效鮑明逺雙鸂鶒錦毛斕斑長比翼戲繞蓮藂回錦臆照灼花叢兩相得漁歌驚起飛南北繚繞追隨不迷惑雲間上下同棲息不作驚禽逺相憶東家少婦機中語剪斷回文泣機杼徒嗟孔雀銜毛羽一去東南别離苦五里徘徊竟何補早梅橋春早梅花滿枝發東風報春春未徹紫蕚迎風玉珠裂楊柳未黃鶯結舌委素飄香照新月橋邊一樹傷離别遊蕩行人莫攀折不競江南艷陽節任落東風伴春雪翡翠塢翡翠飛飛繞蓮塢一啄嘉魚一鳴舞蓮莖觸散蓮葉欹露滴珠光似還浦虞人掠水輕浮弋翡翠驚飛飛不息直上層空翠影髙還向雲間雙比翼彈射莫及弋不得日暮虞人空歎息憶放鶴頃年無錫閒居里人獻鶴雛余馴養之兩嵗羽毛既成見其宛鵛長鳴有烟霄之志開籠放之一舉沖天復回翔久之乃去羽毛似雪無瑕㸃顧影秋池舞白雲閒整素儀三島近回飄清唳九霄聞好風順舉應摩日逸翮將成莫戀羣凌勵坐看空碧外更憐鳬鷺老江濆過吳門二十四韻烟水吳都郭閶門架碧流緑楊深淺巷青翰往來舟朱户千家室丹楹百處樓水光搖極浦草色辨長洲憶作麻衣翠曽為旅棹遊放歌隨楚老清宴奉諸侯貞元中余以布衣多遊吳郡中韋夏卿首為知遇常陪宴席段平仲李季河劉從周綦母咸十餘輩日同杯酒及余以太和七年領鎮㑹稽則當時賔客羣吏樂徒寺僧里客無一人存者至於韋公諸子凋喪略盡花寺聽鶯入春湖看鴈留里吟傳綺唱鄉語認歈謳橋轉攢虹飲波通鬭鷁浮竹扉梅圃靜水巷橘園幽縫堵荒麋苑穿巖破虎丘舊風猶越鼓餘俗尚吳鈎故館曽閒訪遺基亦遍搜吹臺山木盡香徑拂宫秋幔殿菰蒲掩雲房露霧收苧蘿妖覆滅荆棘鬼包羞風月俄黃綬經過半白頭元和七年余以校書郎從役再至蘇州時范十五傳正為郡而貞元中賔客散落半已殂謝及宴而伶人酒徒悉往日者問僧惟令起二人巳疾重來冠蓋客非復别離愁太和七年余鎮㑹稽劉禹錫為郡則元和中蘇州相識知與不知索然皆盡河柳衰謝邑居更易乃甚令威之歎也候火分通陌前旌駐外郵水風搖綵斾堤柳引鳴騶問吏兒孫隔呼名禮敬修顧瞻殊宿昔語默過悲憂義感心空在容衰日易偷還持滄海詔從此布皇猷杭州天竺靈隱二寺頃嵗亦布衣一遊及赴鎮㑹稽不敢以登臨自適竟不復到寺寺多猿猱謂之孫團彌長其類因追思為詩二首此寺殷富翠岩幽谷髙低寺十里松風碧嶂連開盡春花芳草澗遍通秋水月明泉石文照日分霞壁竹影侵雲拂暮煙時有猿猱擾鍾磬老僧無復得安禪一作然人煙不隔江城近水石雖清海氣深波動只觀羅剎相靜居難識梵王心魚扃晝鎖龍宫寶鴈塔髙摩欲界金近日尤聞重雕飾世人遙禮二檀林渡西陵十六韻七年冬十有三日早渡浙江寒雨方霖軍吏悉在江次越人年穀未成霪雨不止田畝浸溢水不及穗者數寸余至驛命押衙裴行宗先齎祝辭東望拜大禹廟且以百姓請命雨收雲息日朗者三旬有五日刈穫皆畢有以見神之不欺也雨送奔濤逺風收駭浪平截流張斾影分岸走鼙聲獸逐銜波湧龜䝉噴棹輕海門凝霧暗江渚濕雲橫鴈翼看舟子魚鱗辨水營騎交遮戍合戈簇擁沙明謬履千夫長將詢百吏情下車占黍稷冬雨害粢盛望禱依前聖垂休冀厚生半江猶慘淡全野巳澄清愛景三晨朗祥農萬庾盈浦程通曲嶼海色媚重城弓日鞬櫜動旗風虎豹爭及郊揮白羽入里卷紅旌愷悌思陳力端莊冀表誠臨人與安俗非止奉師貞新樓詩二十首到越州日初引家纍登新樓望鏡湖見元相微之題壁詩云我是玉京天上客謫居猶得小蓬萊四面尋常對屏障一家終日在樓臺微之與樂天此時只隔江津日有酬和相答時余移官九江各乖音問頃在越之日荏苒多故未能書壁今追思為新樓詩二十首新樓戎容罷引旌旗卷朱户褰開雉堞髙山聳翠微連郡閣地臨滄海接靈鼇坐疑許宅驅雞犬笑類樊妻化羽毛惆悵桂枝零落促莫思方朔種仙桃海榴亭在新樓北花開最早所望更髙海榴花早開繁蘂光照晴霞破碧烟髙近紫霄凝菡萏迥依江月半嬋娟懷芳不作翻風豔别蕚猶含泣露姸搖落舊叢雲水隔不堪行坐數流年望海亭在卧龍山頂上越中最髙處烏盈兔缺天涯迥鶴背松梢拂檻低湖鏡坐隅看匣滿海濤生處辨雲齊夕嵐明滅江帆小煙樹蒼茫客思迷蕭索感心俱是夢九天應共草萋萋杜鵑樓七年冬所造自西軒延架城隅樓前植其杜鵑因以為名杜鵑多在其上杜鵑如火千房拆丹檻低看晚景中繁艷向人啼宿露落英飄砌怨春風早梅昔待佳人折好月誰將老子同惟有此花隨越鳥一聲啼處滿山紅滿桂樓八年春造架州城西南臨眺於外盡見湖山别開水扉通杜鵑樓不啓重扃清夜可以開宴因以滿桂為名也為憐湖水通宵望不學樊陽却月樓惟待素規澄滿鏡莫看織魄掛如鈎卷簾方影侵紅燭繞竹斜暉透碧流蕭飋曉風聞木落此時何異洞庭秋東武亭亭在鏡湖上即元相所建亭至宏敞春秋為競渡大設會之所余為增以板檻延入湖中足加步廊以列環衛緑波春水湖光滿丹檻連楹碧嶂遙蘭鷁對飛魚棹急彩虹翻影海旗搖鬬疑班虎歸三島散作遊龍上九霄鼉鼓若雷爭勝負柳堤花岸萬人招龍宫寺此寺摧毁積嵗貞元十六年余為布衣東游天台故人江西觀察使崔公以殿中謫官移疾剡溪崔公坐中有僧人修真自言居龍宫寺起謂余言異日為修此寺時以狂易之言不之應僧相視久之而退至元和二年余以前進士為故薛蘋常侍招至越中此僧已卧疾使門人相告曩日所言必當鎮此修寺之託幸不見忘僧又偶言寺中靈祇所相告耳余問疾而已不能對及後符其言而訊其存沒則僧及門人悉已殂謝寺更頽毁惟荒基餘礎而已因召僧人㑹真余出俸錢為葺之纍月而畢以成其往願銀地溪邊遇衲師笑將花宇指潛知定觀𤣥度生前事不道靈山别後期真相有無因色界化城興滅在蓮基好令滄海龍宫子長護金人舊浴池禹廟削平水土窮滄海畚鍤東南盡㑹稽山擁翠屏朝玉帛穴通金闕架雲霓祕文鏤石藏青壁寶檢封雲化紫泥清廟萬年長血食始知明德與天齊晏安寺寺在州城東北隅越中謂之小北邙寺深松桂無塵事地接荒郊帶夕陽啼鳥歇時山寂寂野花殘處月蒼蒼絳紗凝焰開金像清梵消聲閉竹房丘壠漸平連茂草九原何處不心傷龜山在鏡湖中山形如龜山上有寺名永安則元相所移置者一峰凝黛當明鏡十仞喬松倚翠屏秋月滿時侵兔魄素波搖處動龜形舊深崖谷藏仙島新結樓臺起佛扃不學大蛟憑水怪等閒雪雨害生靈重臺蓮緑荷舒卷涼風曉紅蕚開縈紫菂重游女漢皋爭笑臉二妃湘浦並愁容自含秋露貞姿結不競春妖冶態穠終恐玉京仙子識却將歸種碧池峰橘園江城霧斂輕霜早園橘千株欲變金朱實摘時天路近素英飄處海雲深懼同枳棘愁遷徙每抱馨香委照臨憐爾結根能一作宜自保不隨寒暑換貞心寶林寺寺在城郭最囂煩處自有一峰巖壑皆入寺中最深城郭在人烟疑借壺中到𣑽天巖樹桂花閒月殿石樓風鐸繞金仙地無塵染多靈草室鑒真空有定泉應是法宫傳覺路使無煩惱見青蓮北樓櫻桃花開花占得春光早雪綴雲裝萬蕚輕凝豔拆時初照日落英頻處乍聞鶯舞空柔弱看無力帶月葱蘢似有情多事東風入閨闥盡飄芳思委江城城上薔薇薔薇繁豔滿城陰爛漫開紅次第深新蘂度香翻宿蝶密房飄影戲晨禽竇閨織婦慙詩句南國佳人怨錦衾風月寂寥思往事暮春空賦白頭吟南庭竹東南舊美凌霜操五月凝隂入坐寒煙惹翠梢含玉露粉開春籜聳琅玕莫令戲馬兒童見試引為龍道士看知爾結根香實在鳳凰終擬下雲端琪樹琪樹垂條如弱柳結子如碧珠三年子可一熟每嵗生者相續一年緑二年碧三年者紅綴於條上璀錯相間石橋峰上栖𤣥鶴碧闕巖邊蔭羽人氷葉萬條垂碧實玉珠千日保青春月中泣露應同浥澗底侵雲尚有塵徒使茯苓成琥珀不為枯老化龍鱗海棠梨海邊佳樹生竒彩知是仙山取得栽瓊蘂籍中聞閬苑紫芝圖上見蓬萊淺深芳蕚通宵換委積紅英報曉開寄語春園百花道莫爭顔色泛金杯水寺烟波野寺經過處水國蒼茫夢想中雲散浦關江月迥日曛洲渚海潮通坐看魚鳥浮沉逺靜見樓臺上下同聞道化城方便諭只應從此到龍宫靈泛橋靈汜橋邊多感傷分明湖派繞回塘岸花前後聞幽鳥湖月髙低怨緑楊能促嵗陰唯白髮巧乘風馬是春光何須化鶴歸華表却數凋零念越鄉若耶溪西施採蓮歐冶鑄劒所嵐光花影繞山陰山轉花稀到碧潯傾國美人妖艷逺鑿山良冶鑄爐深凌波莫惜臨粧面瑩鍔當期出匣心應是蛟龍長不去若耶溪水尚沉沉祭禹廟回降雪五言二十韻此詩一首在越所作今編入卷內太和八年十月冬暄無雪自訪禹廟所禱至自回舟至湖半陰雲四合飛霰大降者三日積雪盈尺浙江中流乃分陰雪杭州並無所沾金奏雲壇畢同雲拂海來玉田千畝合瓊室萬家開湖暗氷封鏡山明樹變梅裂繒分井陌連璧混樓臺麻引詩人興鹽牽謝女才細疑歌響盡旋作舞腰回著水鵝毛失鋪松鶴羽摧半崖雲掩映當砌月徘徊遇物纎能狀隨方巧若裁玉花全綴蕚珠蚌盡成胎志士書頻照蛟人杼正催妬粧凌粉匣欺酒上瓊杯海使迷奔轍江濤認暗雷疾飄風作馭輕集霰為媒劒客休矜利農師正念摧瑞彰知有感靈貺表無災堯厯占新慶虞階想舊陪粉凝鸞閣下銀結鳯池隈雞樹花驚笑龍池絮欲猜勞歌㑹稽守遙祝詠康哉題法華寺五言二十韻此一首亦在越所作寺內靈異隨注其下以越人題詩者前後皆不備言今編于追昔遊卷中寺內翼禪師草廬持經感普賢見於前花界無生地慈宫有相天化娥騰寶像留影閟金仙寺內因普賢見身於持經僧前因此置寺殿湧全身塔池開半月泉十峰排碧落雙澗合清漣寺前後有十峰回繞雙澗合流之勝藥草經行遍香燈次第燃戒珠髙臘護心印祖僧傳此寺僧律嚴肅持經皆承師教瓶識先羅漢衣存舊福田寺內有約法師水瓶梁朝宫人所制袈裟幻身觀火宅昏眼照青蓮住覺超真境依游渡法船化城殊百億靈跡冠三千蕭壁將沉影梁薪尚綴煙寺前昭明太子畫真又梁時薪公影尚在色塵知有數劫燼豈無年龍噴疑通海鯨吞想漏川寺內有梁朝銅龍吐泉銅鯨飲水以注諸院磬疏聞啓梵鐘息見安禪指喻三車覺開迷五陰纒教通方便入心達是非詮貝葉千花藏檀林萬寶篇坐嚴獅子迅幢飾網珠懸極樂知無礙分明應有緣還將意功德留偈法王前追昔遊集卷中
